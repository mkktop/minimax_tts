name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          port: ${{ secrets.SERVER_PORT }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "🚀 开始部署 MiniMax TTS..."

            # 进入项目目录
            cd ${{ secrets.DEPLOY_PATH }}

            # 拉取最新代码
            echo "📦 拉取最新代码..."
            git pull origin main

            # 安装依赖
            echo "📥 安装依赖..."
            npm install --production

            # 确保 logs 目录存在
            mkdir -p logs

            # 重启应用（如果 PM2 还没有启动则启动）
            if pm2 describe minimax-tts > /dev/null 2>&1; then
              echo "🔄 重启应用..."
              pm2 reload ecosystem.config.js
            else
              echo "🆕 首次启动应用..."
              pm2 start ecosystem.config.js
            fi

            # 保存 PM2 进程列表（开机自启用）
            pm2 save

            echo "✅ 部署完成！"
            pm2 status
